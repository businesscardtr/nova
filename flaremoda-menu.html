<style>
  :root{
    --ink:#1c130d;
    --cream:#f4ecdf;
    --moon:#e7d9c0;
    --bark:#5c3a23;
    --bark-deep:#3a2415;
    --ember:#c2703a;
    --gold:#cf9a4e;
    --line: rgba(28,19,13,0.12);
    --night: #14100c;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(207,154,78,0.16), transparent 60%),
      var(--cream);
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
  }
  a{color:inherit;}
  img{display:block;max-width:100%;}

  /* ===== Top nav (moon phase scrubber) ===== */
  .topbar{
    position:sticky; top:0; z-index:50;
    background:rgba(244,236,223,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:920px; margin:0 auto;
    display:flex; align-items:center; gap:14px;
    padding:14px 20px;
  }
  .moon-mark{
    width:30px;height:30px;border-radius:50%;
    background:
      radial-gradient(circle at 32% 32%, #fff7e6 0%, var(--moon) 45%, var(--bark) 100%);
    box-shadow:0 0 0 1px var(--line), inset -6px -4px 10px rgba(60,36,18,0.35);
    flex:none;
  }
  .topbar-name{font-size:15px; font-weight:800; letter-spacing:.02em;}
  .topbar-tag{font-size:11px; color:var(--bark); opacity:.75; margin-left:auto; text-align:right; font-style:italic; font-family:'Cormorant Garamond', serif; font-size:14px;}

  .navscroll{
    display:flex; gap:8px; overflow-x:auto;
    padding:0 20px 14px; max-width:920px; margin:0 auto;
    scrollbar-width:none;
  }
  .navscroll::-webkit-scrollbar{display:none;}
  .navscroll a{
    flex:none;
    font-size:12.5px; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
    padding:7px 14px; border-radius:999px;
    border:1px solid var(--line);
    color:var(--bark-deep);
    text-decoration:none;
    white-space:nowrap;
    background:rgba(255,255,255,0.4);
  }
  .navscroll a:hover{border-color:var(--ember); color:var(--ember);}

  /* ===== Hero ===== */
  .hero{
    position:relative;
    max-width:920px; margin:0 auto;
    padding:56px 24px 40px;
    text-align:center;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(92,58,35,0.5) 1px, transparent 1px);
    background-size:22px 22px;
    opacity:.18;
    pointer-events:none;
  }
  .hero-eyebrow{
    font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--ember); font-weight:700; margin-bottom:18px;
  }
  .hero h1{
    font-size:clamp(40px,8vw,64px);
    line-height:1;
    margin:0 0 14px;
    color:var(--bark-deep);
  }
  .hero p.sub{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(17px,3vw,21px);
    color:var(--bark);
    margin:0 auto 28px;
    max-width:480px;
  }
  .moon-phase-row{
    display:flex; justify-content:center; gap:10px; margin-top:8px;
  }
  .moon-phase-row span{
    width:9px;height:9px;border-radius:50%;
    background:var(--moon);
    box-shadow: inset -2px -1px 2px rgba(60,36,18,0.45);
  }
  .moon-phase-row span:nth-child(4){background:var(--ember); box-shadow:0 0 0 3px rgba(194,112,58,0.18);}

  /* ===== Category section ===== */
  .category{
    max-width:920px; margin:0 auto;
    padding:28px 24px 6px;
    scroll-margin-top:96px;
  }
  .category-head{
    display:flex; align-items:baseline; gap:14px;
    margin-bottom:20px;
  }
  .category-head h2{
    font-size:clamp(22px,4vw,28px);
    margin:0;
    color:var(--bark-deep);
  }
  .category-head .rule{
    flex:1; height:1px;
    background:var(--line);
  }
  .category-head .count{
    font-size:10.5px; letter-spacing:.1em; color:var(--bark); opacity:.55; font-weight:700;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }
  @media (min-width:640px){
    .grid{grid-template-columns:repeat(3,1fr);}
  }

  .item{
    background:rgba(255,255,255,0.55);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    display:flex; flex-direction:column;
    transition:border-color .15s ease, transform .15s ease;
  }
  .item:hover{border-color:var(--ember); transform:translateY(-2px);}
  .item-photo{
    width:100%; aspect-ratio:1/1;
    background:var(--moon);
    overflow:hidden;
    position:relative;
  }
  .item-photo img{
    width:100%; height:100%; object-fit:cover;
  }
  .item-photo.noimg{
    display:flex; align-items:center; justify-content:center;
  }
  .item-photo.noimg::after{
    content:"☾";
    font-size:28px;
    color:var(--bark);
    opacity:.25;
  }
  .item-body{
    padding:12px 13px 14px;
    display:flex; flex-direction:column; gap:5px; flex:1;
  }
  .item-name{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:17px;
    line-height:1.15;
    color:var(--ink);
  }
  .item-desc{
    font-size:11.5px;
    line-height:1.4;
    color:var(--bark);
    opacity:.85;
    flex:1;
  }
  .item-foot{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:4px;
  }
  .item-price{
    font-size:13.5px; font-weight:800; color:var(--ember);
    font-variant-numeric:tabular-nums;
  }
  .item-cal{
    font-size:10px; color:var(--bark); opacity:.55; font-weight:600;
  }

  /* ===== Footer ===== */
  footer{
    margin-top:70px;
    padding:40px 24px 50px;
    text-align:center;
    background:var(--night);
    color:var(--cream);
  }
  footer .moon-mark{margin:0 auto 14px;}
  footer h3{

  }
  footer p{
    font-size:12px; opacity:.6; margin:4px 0 0; letter-spacing:.04em;
  }

  ::selection{background:var(--ember); color:#fff;}

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    .item{transition:none;}
  }
</style>

function slugify(s){
  return s.toLowerCase()
    .replace(/ı/g,'i').replace(/ş/g,'s').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

function fmtPrice(p){
  return parseFloat(p).toFixed(0) + " ₺";
}

const nav = document.getElementById('navscroll');
const root = document.getElementById('menu-root');

MENU.forEach(section => {
  const id = slugify(section.cat);

  const navLink = document.createElement('a');
  navLink.href = '#' + id;
  navLink.textContent = section.cat;
  nav.appendChild(navLink);

  const cat = document.createElement('section');
  cat.className = 'category';
  cat.id = id;

  cat.innerHTML = `
    <div class="category-head">
      <h2>${section.cat}</h2>
      <div class="rule"></div>
      <div class="count">${section.items.length} ÜRÜN</div>
    </div>
    <div class="grid"></div>
  `;

  const grid = cat.querySelector('.grid');
  section.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item';
    const photoHtml = item.img
      ? `<div class="item-photo"><img src="${item.img}" alt="${item.name}" loading="lazy"></div>`
      : `<div class="item-photo noimg"></div>`;
    card.innerHTML = `
      ${photoHtml}
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        <div class="item-foot">
          <div class="item-price">${fmtPrice(item.price)}</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  root.appendChild(cat);
});

// Anchor linklerin sayfa navigasyonu tetiklemesini engelle, sadece sayfa içi kaydır
document.addEventListener('click', function(e){
  const link = e.target.closest('a[href^="#"]');
  if(!link) return;
  e.preventDefault();
  const targetId = link.getAttribute('href').slice(1);
  const target = document.getElementById(targetId);
  if(target){
    target.scrollIntoView({behavior:'smooth', block:'start'});
    history.replaceState(null, '', '#' + targetId);
  }
});
</script>
